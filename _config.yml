title: VaiBReport
description: >-
  Daily GitHub repo picks for solo founders, AI/B2B SaaS builders,
  and small business tools.
url: "https://chaosagent.github.io"
baseurl: "/VaiBReport"

# Build settings
markdown: kramdown
theme: minima
permalink: /:year/:month/:day/:title/

# Excludes
exclude:
  - data/
  - config/
  - static/
  - README.md
  - CONTEXT.md
  - VaiBReport-SPEC.md
  - CLAUDE-CODE-SETUP-PROMPT.md
  - COWORK-DIGEST-PROMPT.md
  - CLAUDE-CODE-V1-FINALIZE.md
  - "*.pdf"
  - node_modules/
  - package.json
  - package-lock.json
  - .gitignore
  - "V2-*.md"
  - "CLAUDE-CODE-*.md"
