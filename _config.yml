title: VaiBReport
description: >-
  Daily curated tools, repos, models, and launches from GitHub,
  HuggingFace, Replicate, GitLab, npm, PyPI, Ollama, Papers with Code,
  and indie launch platforms. Built for solo founders, AI builders,
  and small business tool seekers.
url: "https://chaosagent.github.io"
baseurl: "/VaiBReport"

# Build settings
markdown: kramdown
theme: minima
permalink: /:year/:month/:day/:title/

# Collections
collections:
  repos:
    output: true
    permalink: /repos/:name/

defaults:
  - scope:
      path: ""
      type: "repos"
    values:
      layout: "repo"

# Navigation
header_pages:
  - repos.md
  - leaderboard.md
  - about.md

# Excludes
exclude:
  - data/
  - config/
  - static/
  - README.md
  - CONTEXT.md
  - VaiBReport-SPEC.md
  - CLAUDE-CODE-SETUP-PROMPT.md
  - COWORK-DIGEST-PROMPT.md
  - CLAUDE-CODE-V1-FINALIZE.md
  - "*.pdf"
  - node_modules/
  - package.json
  - package-lock.json
  - .gitignore
  - "V2-*.md"
  - "CLAUDE-CODE-*.md"
