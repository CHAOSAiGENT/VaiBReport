title: VaiBReport
description: >-
  Daily GitHub repo picks for solo founders, AI/B2B SaaS builders,
  and small business tools.
url: "https://chaosagent.github.io"
baseurl: "/VaiBReport"

# Build settings
markdown: kramdown
theme: minima
permalink: /:year/:month/:day/:title/

# Excludes
exclude:
  - data/
  - config/
  - static/
  - README.md
  - CONTEXT.md
  - node_modules/
  - package.json
  - package-lock.json
