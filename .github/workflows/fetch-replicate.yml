name: Fetch Replicate models

on:
  schedule:
    - cron: "15 13 * * *"
  workflow_dispatch:

jobs:
  fetch-replicate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch Replicate models
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          node --input-type=module << 'SCRIPT'
          import fs from 'fs';

          const delay = (ms) => new Promise(r => setTimeout(r, ms));
          const token = process.env.REPLICATE_API_TOKEN;
          if (!token) {
            console.log('No REPLICATE_API_TOKEN — skipping');
            process.exit(0);
          }
          const headers = { 'Authorization': `Bearer ${token}` };

          const SIX_MONTHS_AGO = new Date();
          SIX_MONTHS_AGO.setMonth(SIX_MONTHS_AGO.getMonth() - 6);

          async function fetchModels() {
            const allModels = [];
            let url = 'https://api.replicate.com/v1/models?cursor=';
            for (let page = 0; page < 2; page++) {
              try {
                const res = await fetch(url, { headers });
                if (!res.ok) {
                  console.error(`Replicate API error: ${res.status}`);
                  break;
                }
                const data = await res.json();
                if (data.results) allModels.push(...data.results);
                if (data.next) {
                  url = data.next;
                } else {
                  break;
                }
              } catch (e) {
                console.error('Replicate fetch error:', e.message);
                break;
              }
              await delay(1000);
            }
            return allModels;
          }

          (async () => {
            const raw = await fetchModels();

            const models = raw
              .filter(m => {
                if (!m.owner || m.owner === 'replicate') return false;
                if ((m.run_count || 0) < 100) return false;
                const updated = m.latest_version?.created_at || m.created_at;
                if (updated && new Date(updated) < SIX_MONTHS_AGO) return false;
                return true;
              })
              .map(m => ({
                id: `${m.owner}/${m.name}`,
                url: m.url || `https://replicate.com/${m.owner}/${m.name}`,
                description: m.description || '',
                run_count: m.run_count || 0,
                likes: m.github_stars || 0,
                created_at: m.created_at,
                last_modified: m.latest_version?.created_at || m.created_at,
                tags: [],
                _source: 'replicate',
                _platform: 'replicate'
              }))
              .sort((a, b) => b.run_count - a.run_count);

            const date = new Date().toISOString().slice(0, 10);
            const payload = {
              generated_at: new Date().toISOString(),
              source: 'replicate',
              counts: { models: models.length },
              models
            };

            if (!fs.existsSync('data')) fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync(`data/replicate-${date}.json`, JSON.stringify(payload, null, 2));
            console.log(`Wrote ${models.length} Replicate models`);
          })().catch(err => { console.error(err); process.exit(1); });
          SCRIPT

      - name: Commit and push
        run: |
          date=$(date -u +"%Y-%m-%d")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Add Replicate snapshot for ${date}"
          git push
